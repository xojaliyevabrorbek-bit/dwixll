<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türkçe Lug'at Testi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f0e17;
    --surface: #1a1830;
    --card: #211f35;
    --accent: #e8c547;
    --accent2: #ff6b6b;
    --accent3: #6bcbff;
    --correct: #4ade80;
    --wrong: #f87171;
    --text: #fffffe;
    --muted: #a7a9be;
    --border: rgba(232,197,71,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background decoration */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    right: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(232,197,71,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    left: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(107,203,255,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* SCREENS */
  .screen { display:none; position:relative; z-index:1; }
  .screen.active { display:block; }

  /* ===== WELCOME ===== */
  #welcome {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }
  #welcome.active { display:flex; }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(232,197,71,0.1);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 0.4rem 1.2rem;
    font-size: 0.8rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .main-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 1rem;
    background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 1.05rem;
    font-weight: 300;
    margin-bottom: 3rem;
    max-width: 460px;
    line-height: 1.6;
  }

  .level-selector {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 2rem;
  }

  .level-btn {
    padding: 0.6rem 1.4rem;
    border-radius: 50px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .level-btn:hover { border-color: var(--accent); color: var(--accent); }
  .level-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f0e17;
    font-weight: 600;
  }

  .count-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .count-label { color: var(--muted); font-size: 0.9rem; }
  .count-input {
    width: 80px;
    padding: 0.5rem 0.8rem;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .count-input:focus { border-color: var(--accent); }

  .direction-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .dir-btn {
    padding: 0.55rem 1.2rem;
    border-radius: 50px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .dir-btn:hover { border-color: var(--accent3); color: var(--accent3); }
  .dir-btn.selected {
    background: var(--accent3);
    border-color: var(--accent3);
    color: #0f0e17;
    font-weight: 600;
  }

  .start-btn {
    padding: 1rem 3rem;
    background: linear-gradient(135deg, var(--accent), #f0a500);
    border: none;
    border-radius: 50px;
    color: #0f0e17;
    font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 30px rgba(232,197,71,0.25);
    letter-spacing: 0.02em;
  }
  .start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 40px rgba(232,197,71,0.4);
  }
  .start-btn:active { transform: translateY(0); }

  .stats-preview {
    display: flex;
    gap: 2rem;
    margin-top: 2.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--accent);
    font-weight: 700;
  }
  .stat-desc { color: var(--muted); font-size: 0.8rem; margin-top: 0.2rem; }

  /* ===== QUIZ ===== */
  #quiz {
    min-height: 100vh;
    padding: 1.5rem;
    max-width: 680px;
    margin: 0 auto;
  }
  #quiz.active { display:flex; flex-direction:column; }

  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    gap: 1rem;
  }

  .progress-wrap { flex: 1; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.5rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #f0a500);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  .score-badges {
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.35rem 0.8rem;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .badge-correct { background: rgba(74,222,128,0.15); color: var(--correct); }
  .badge-wrong { background: rgba(248,113,113,0.15); color: var(--wrong); }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2.5rem;
    margin-bottom: 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .level-tag {
    display: inline-block;
    padding: 0.2rem 0.8rem;
    border-radius: 50px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }
  .tag-a2 { background: rgba(107,203,255,0.15); color: var(--accent3); }
  .tag-b1 { background: rgba(232,197,71,0.15); color: var(--accent); }
  .tag-b2 { background: rgba(255,107,107,0.15); color: var(--accent2); }
  .tag-c1 { background: rgba(180,107,255,0.15); color: #b46bff; }

  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .question-sub {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 0.5rem;
  }

  /* Options */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.85rem;
    margin-bottom: 1.5rem;
  }

  .option-btn {
    padding: 1rem 1.2rem;
    background: var(--surface);
    border: 1.5px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
    cursor: pointer;
    text-align: left;
    transition: all 0.18s;
    line-height: 1.4;
    position: relative;
    overflow: hidden;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(232,197,71,0.07);
    transform: translateY(-1px);
  }
  .option-btn:disabled { cursor: default; }

  .option-btn.correct {
    border-color: var(--correct);
    background: rgba(74,222,128,0.12);
    color: var(--correct);
    font-weight: 600;
  }
  .option-btn.wrong {
    border-color: var(--wrong);
    background: rgba(248,113,113,0.12);
    color: var(--wrong);
    font-weight: 600;
  }
  .option-btn.reveal {
    border-color: var(--correct);
    background: rgba(74,222,128,0.06);
    color: var(--correct);
  }

  .option-letter {
    display: inline-block;
    width: 24px;
    height: 24px;
    line-height: 24px;
    text-align: center;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    font-size: 0.75rem;
    font-weight: 700;
    margin-right: 0.6rem;
    flex-shrink: 0;
    vertical-align: middle;
  }
  .option-btn.correct .option-letter { background: rgba(74,222,128,0.3); }
  .option-btn.wrong .option-letter { background: rgba(248,113,113,0.3); }

  /* Feedback */
  .feedback-bar {
    padding: 1rem 1.5rem;
    border-radius: 16px;
    display: none;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
    animation: slideUp 0.3s ease;
  }
  .feedback-bar.show { display:flex; }
  .feedback-bar.ok { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.25); }
  .feedback-bar.err { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.25); }
  .feedback-icon { font-size: 1.4rem; flex-shrink:0; }
  .feedback-text { font-size: 0.9rem; line-height:1.4; }
  .feedback-text strong { display:block; margin-bottom:0.2rem; }

  .next-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--accent), #f0a500);
    border: none;
    border-radius: 16px;
    color: #0f0e17;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    display: none;
    transition: opacity 0.2s, transform 0.2s;
  }
  .next-btn.show { display:block; animation: slideUp 0.3s ease; }
  .next-btn:hover { opacity:0.9; transform:translateY(-1px); }

  @keyframes slideUp {
    from { opacity:0; transform:translateY(12px); }
    to { opacity:1; transform:translateY(0); }
  }

  /* ===== RESULT ===== */
  #result {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }
  #result.active { display:flex; }

  .result-emoji { font-size: 4rem; margin-bottom: 1rem; }

  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    font-weight: 900;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .result-sub { color: var(--muted); margin-bottom: 2.5rem; font-size: 1rem; }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 2.5rem;
    width: 100%;
    max-width: 420px;
  }
  .result-stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.2rem 0.8rem;
  }
  .result-stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
  }
  .result-stat-num.green { color: var(--correct); }
  .result-stat-num.red { color: var(--wrong); }
  .result-stat-num.gold { color: var(--accent); }
  .result-stat-label { color: var(--muted); font-size: 0.75rem; margin-top: 0.4rem; }

  /* Percentage circle */
  .pct-circle {
    width: 130px;
    height: 130px;
    margin: 0 auto 2rem;
    position: relative;
  }
  .pct-circle svg { transform: rotate(-90deg); }
  .pct-circle-track { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 8; }
  .pct-circle-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);
  }
  .pct-number {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
  }

  /* Wrong answers list */
  .wrong-list {
    width: 100%;
    max-width: 520px;
    text-align: left;
    margin-bottom: 2rem;
  }
  .wrong-list-title {
    color: var(--muted);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .wrong-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.7rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    gap: 1rem;
    font-size: 0.9rem;
  }
  .wrong-item-q { color: var(--text); font-weight: 500; }
  .wrong-item-a { color: var(--correct); font-size: 0.85rem; }

  .result-actions {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn-primary {
    padding: 0.9rem 2.2rem;
    background: linear-gradient(135deg, var(--accent), #f0a500);
    border: none;
    border-radius: 50px;
    color: #0f0e17;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:hover { transform:translateY(-2px); box-shadow: 0 6px 30px rgba(232,197,71,0.3); }
  .btn-secondary {
    padding: 0.9rem 2.2rem;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 50px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--text); color: var(--text); }

  /* Responsive */
  @media(max-width:500px) {
    .options-grid { grid-template-columns: 1fr; }
    .question-card { padding: 1.5rem; }
    .result-grid { grid-template-columns: repeat(3,1fr); }
  }
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome" class="screen active">
  <div class="logo-badge">🇹🇷 Hilol Edu × Lug'at Testi</div>
  <h1 class="main-title">Türkçe So'zlar<br>Testi</h1>
  <p class="subtitle">A2 · B1 · B2 · C1 darajasidagi so'zlarni o'rgan va bilimingni sinab ko'r</p>

  <div class="level-selector" id="levelSelector">
    <button class="level-btn selected" data-level="all">Hammasi</button>
    <button class="level-btn" data-level="a2" style="border-color:rgba(107,203,255,0.3)">A2</button>
    <button class="level-btn" data-level="b1" style="border-color:rgba(232,197,71,0.3)">B1</button>
    <button class="level-btn" data-level="b2" style="border-color:rgba(255,107,107,0.3)">B2</button>
    <button class="level-btn" data-level="c1" style="border-color:rgba(180,107,255,0.3)">C1</button>
  </div>

  <div class="direction-row" id="dirSelector">
    <button class="dir-btn selected" data-dir="tr2uz">🇹🇷 → 🇺🇿 Türkçe → O'zbekcha</button>
    <button class="dir-btn" data-dir="uz2tr">🇺🇿 → 🇹🇷 O'zbekcha → Türkçe</button>
    <button class="dir-btn" data-dir="mixed">🔀 Aralash</button>
  </div>

  <div class="count-row">
    <span class="count-label">Savollar soni:</span>
    <input type="number" class="count-input" id="countInput" value="20" min="5" max="100">
  </div>

  <button class="start-btn" onclick="startQuiz()">Testni boshlash →</button>

  <div class="stats-preview">
    <div class="stat-item">
      <div class="stat-num" id="totalWords">0</div>
      <div class="stat-desc">jami so'z</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">4</div>
      <div class="stat-desc">daraja</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">4</div>
      <div class="stat-desc">variant</div>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="qNum">1 / 20</span>
        <span id="qLevel"></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <div class="score-badges">
      <div class="badge badge-correct">✓ <span id="correctCount">0</span></div>
      <div class="badge badge-wrong">✗ <span id="wrongCount">0</span></div>
    </div>
  </div>

  <div class="question-card">
    <div class="level-tag" id="questionLevelTag">A2</div>
    <div class="question-sub" id="questionDir">Türkçe so'zning o'zbekcha ma'nosini toping</div>
    <div class="question-text" id="questionText">—</div>
  </div>

  <div class="options-grid" id="optionsGrid"></div>

  <div class="feedback-bar" id="feedbackBar">
    <div class="feedback-icon" id="feedbackIcon"></div>
    <div class="feedback-text" id="feedbackText"></div>
  </div>

  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Keyingisi →</button>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-emoji" id="resultEmoji">🏆</div>
  <h2 class="result-title" id="resultTitle">Ajoyib!</h2>
  <p class="result-sub" id="resultSub">Test yakunlandi</p>

  <div class="pct-circle">
    <svg width="130" height="130" viewBox="0 0 130 130">
      <circle class="pct-circle-track" cx="65" cy="65" r="56"/>
      <circle class="pct-circle-fill" id="pctFill" cx="65" cy="65" r="56"
        stroke-dasharray="351.86"
        stroke-dashoffset="351.86"/>
    </svg>
    <div class="pct-number" id="pctNumber">0%</div>
  </div>

  <div class="result-grid">
    <div class="result-stat">
      <div class="result-stat-num green" id="rCorrect">0</div>
      <div class="result-stat-label">To'g'ri</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-num red" id="rWrong">0</div>
      <div class="result-stat-label">Xato</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-num gold" id="rTotal">0</div>
      <div class="result-stat-label">Jami</div>
    </div>
  </div>

  <div class="wrong-list" id="wrongList"></div>

  <div class="result-actions">
    <button class="btn-primary" onclick="restartQuiz()">🔁 Qayta urinish</button>
    <button class="btn-secondary" onclick="goHome()">⚙ Sozlamalar</button>
  </div>
</div>

<script>
// =============================================
//   LEKSIKA MA'LUMOTLAR BAZASI
// =============================================
const allWords = [
  // ========== A2 daraja ==========
  // Unit 1
  {tr:"aç",uz:"och",level:"a2"},
  {tr:"açık",uz:"ochiq",level:"a2"},
  {tr:"adres",uz:"manzil",level:"a2"},
  {tr:"akşam",uz:"kechqurun",level:"a2"},
  {tr:"alışveriş",uz:"savdo-sotiq",level:"a2"},
  {tr:"alışveriş merkezi",uz:"savdo-sotiq markazi",level:"a2"},
  {tr:"alt",uz:"ost, past",level:"a2"},
  {tr:"anahtar",uz:"kalit",level:"a2"},
  {tr:"aşçı",uz:"oshpaz",level:"a2"},
  {tr:"avukat",uz:"advokat",level:"a2"},
  {tr:"ay",uz:"oy",level:"a2"},
  {tr:"başarılı",uz:"muvaffaqiyatli",level:"a2"},

// =============================================
//   STATE
// =============================================
let selectedLevel = 'all';
let selectedDir = 'tr2uz';
let questionCount = 20;
let quizWords = [];
let currentIndex = 0;
let correctScore = 0;
let wrongScore = 0;
let wrongAnswers = [];
let answered = false;

// =============================================
//   INIT
// =============================================
document.getElementById('totalWords').textContent = allWords.length;

// Level selector
document.getElementById('levelSelector').addEventListener('click', e => {
  const btn = e.target.closest('.level-btn');
  if(!btn) return;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedLevel = btn.dataset.level;
});

// Direction selector
document.getElementById('dirSelector').addEventListener('click', e => {
  const btn = e.target.closest('.dir-btn');
  if(!btn) return;
  document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedDir = btn.dataset.dir;
});

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function getFilteredWords() {
  if(selectedLevel === 'all') return allWords;
  return allWords.filter(w => w.level === selectedLevel);
}

function startQuiz() {
  const filtered = getFilteredWords();
  if(filtered.length < 4) {
    alert("Bu daraja uchun yetarli so'z yo'q!");
    return;
  }
  questionCount = Math.min(parseInt(document.getElementById('countInput').value) || 20, filtered.length);
  quizWords = shuffle(filtered).slice(0, questionCount);
  currentIndex = 0;
  correctScore = 0;
  wrongScore = 0;
  wrongAnswers = [];

  showScreen('quiz');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQuestion() {
  answered = false;
  const word = quizWords[currentIndex];
  const isUz2Tr = selectedDir === 'uz2tr' || (selectedDir === 'mixed' && Math.random() < 0.5);

  // Progress
  const pct = (currentIndex / questionCount) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('qNum').textContent = `${currentIndex+1} / ${questionCount}`;
  document.getElementById('correctCount').textContent = correctScore;
  document.getElementById('wrongCount').textContent = wrongScore;

  // Level tag
  const tag = document.getElementById('questionLevelTag');
  tag.className = 'level-tag tag-' + word.level;
  tag.textContent = word.level.toUpperCase();

  // Question
  const qText = document.getElementById('questionText');
  const qDir = document.getElementById('questionDir');
  if(isUz2Tr) {
    qText.textContent = word.uz.split(',')[0].trim();
    qDir.textContent = "O'zbekcha so'zning turkcha ma'nosini toping";
    word._isUz2Tr = true;
  } else {
    qText.textContent = word.tr;
    qDir.textContent = "Turkcha so'zning o'zbekcha ma'nosini toping";
    word._isUz2Tr = false;
  }

  // Options — pick 3 wrong from same or nearby level
  const pool = allWords.filter(w => w !== word);
  const shuffledPool = shuffle(pool);
  const wrongs = shuffledPool.slice(0, 3);
  const options = shuffle([word, ...wrongs]);

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  const letters = ['A','B','C','D'];

  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    const displayText = isUz2Tr ? opt.tr : opt.uz.split(',')[0].trim();
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${displayText}`;
    btn.dataset.word = JSON.stringify(opt);
    btn.onclick = () => selectAnswer(btn, word, isUz2Tr);
    grid.appendChild(btn);
  });

  // Feedback + next
  document.getElementById('feedbackBar').className = 'feedback-bar';
  document.getElementById('nextBtn').className = 'next-btn';
}

function selectAnswer(btn, correctWord, isUz2Tr) {
  if(answered) return;
  answered = true;

  const chosen = JSON.parse(btn.dataset.word);
  const isCorrect = chosen === correctWord;

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    const w = JSON.parse(b.dataset.word);
    if(w === correctWord) {
      b.classList.add('correct');
    }
  });

  const fb = document.getElementById('feedbackBar');
  const fi = document.getElementById('feedbackIcon');
  const ft = document.getElementById('feedbackText');

  if(isCorrect) {
    correctScore++;
    btn.classList.add('correct');
    fb.classList.add('show', 'ok');
    fi.textContent = '✅';
    ft.innerHTML = `<strong>To'g'ri!</strong>`;
  } else {
    wrongScore++;
    btn.classList.add('wrong');
    fb.classList.add('show', 'err');
    fi.textContent = '❌';
    const correct = isUz2Tr ? correctWord.tr : correctWord.uz;
    ft.innerHTML = `<strong>Xato!</strong> To'g'ri javob: <span style="color:var(--correct);font-weight:600">${correct}</span>`;
    wrongAnswers.push({ q: isUz2Tr ? correctWord.uz : correctWord.tr, a: isUz2Tr ? correctWord.tr : correctWord.uz });
  }

  document.getElementById('correctCount').textContent = correctScore;
  document.getElementById('wrongCount').textContent = wrongScore;
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentIndex++;
  if(currentIndex >= questionCount) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  showScreen('result');
  const pct = Math.round((correctScore / questionCount) * 100);

  // Emoji & title
  let emoji, title;
  if(pct >= 90) { emoji='🏆'; title='Ajoyib natija!'; }
  else if(pct >= 70) { emoji='🎉'; title='Yaxshi!'; }
  else if(pct >= 50) { emoji='💪'; title='Zo\'r urinish!'; }
  else { emoji='📚'; title='Mashq kerak!'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = `${questionCount} ta savoldan ${correctScore} tasiga to'g'ri javob berdingiz`;
  document.getElementById('rCorrect').textContent = correctScore;
  document.getElementById('rWrong').textContent = wrongScore;
  document.getElementById('rTotal').textContent = questionCount;
  document.getElementById('pctNumber').textContent = pct + '%';

  // Animate circle
  const circumference = 351.86;
  const offset = circumference - (pct / 100) * circumference;
  setTimeout(() => {
    document.getElementById('pctFill').style.strokeDashoffset = offset;
  }, 100);

  // Wrong answers list
  const wl = document.getElementById('wrongList');
  if(wrongAnswers.length > 0) {
    let html = `<div class="wrong-list-title">❌ Xato javoblar (${wrongAnswers.length} ta)</div>`;
    wrongAnswers.slice(0,15).forEach(item => {
      html += `<div class="wrong-item">
        <span class="wrong-item-q">${item.q}</span>
        <span class="wrong-item-a">→ ${item.a}</span>
      </div>`;
    });
    if(wrongAnswers.length > 15) {
      html += `<div style="color:var(--muted);font-size:0.8rem;padding:0.5rem 0">... va yana ${wrongAnswers.length-15} ta</div>`;
    }
    wl.innerHTML = html;
    wl.style.display = 'block';
  } else {
    wl.innerHTML = `<div style="text-align:center;color:var(--correct);padding:1rem">🎯 Barcha javoblar to'g'ri!</div>`;
    wl.style.display = 'block';
  }
}

function restartQuiz() {
  startQuiz();
}

function goHome() {
  showScreen('welcome');
}
